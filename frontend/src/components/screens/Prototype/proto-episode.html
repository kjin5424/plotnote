<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>PlotNote — 에피소드</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&family=Noto+Serif+KR:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --db: #2a4d88;
        --oc: #7c94b8;
        --gl: #b1bbc8;
        --co: #d9d9d8;
        --am: #fbc662;
        --am-bg: #fff8e6;
        --wh: #fefefe;
        --pa: #f7f6f3;
        --ink: #1a1a1a;
        --i2: #4a4a4a;
        --gh: #9a9a9a;
        --bd: #e8e6e0;
        --bd2: #d5d2cb;
        --sw: 220px;
        --hh: 48px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans KR", sans-serif;
        background: var(--pa);
        color: var(--ink);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-size: 13px;
      }
      button {
        font-family: "Noto Sans KR", sans-serif;
        cursor: pointer;
      }
      .hd {
        height: var(--hh);
        background: var(--wh);
        border-bottom: 1px solid var(--bd);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
        flex-shrink: 0;
      }
      .hd-menu {
        width: 28px;
        height: 28px;
        border-radius: 5px;
        border: none;
        background: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3.5px;
      }
      .hd-menu:hover {
        background: var(--pa);
      }
      .hd-menu span {
        display: block;
        height: 1.5px;
        border-radius: 1px;
        background: var(--gh);
      }
      .hd-menu span:nth-child(1) {
        width: 14px;
      }
      .hd-menu span:nth-child(2) {
        width: 10px;
      }
      .hd-menu span:nth-child(3) {
        width: 14px;
      }
      .bc {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--gh);
      }
      .bc a {
        color: var(--gh);
        text-decoration: none;
        cursor: pointer;
      }
      .bc a:hover {
        color: var(--db);
      }
      .bc .cur {
        color: var(--ink);
        font-weight: 500;
      }
      .bc .sep {
        color: var(--co);
      }
      .hd-r {
        margin-left: auto;
        display: flex;
        gap: 4px;
      }
      .hbtn {
        width: 28px;
        height: 28px;
        border-radius: 5px;
        border: none;
        background: none;
        color: var(--gh);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .hbtn:hover {
        background: var(--pa);
      }
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      .sb {
        width: var(--sw);
        min-width: var(--sw);
        height: 100%;
        background: var(--wh);
        border-right: 1px solid var(--bd);
        display: flex;
        flex-direction: column;
      }
      .sb-logo {
        padding: 13px 16px 11px;
        border-bottom: 1px solid var(--bd);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .sb-mk {
        width: 24px;
        height: 24px;
        background: var(--db);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sb-mk svg {
        width: 12px;
        height: 12px;
        fill: #fff;
      }
      .sb-nm {
        font-family: "DM Mono", monospace;
        font-size: 12px;
      }
      .sb-sec {
        padding: 8px 8px 3px;
      }
      .sb-lbl {
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gh);
        padding: 0 8px;
        margin-bottom: 2px;
      }
      .si {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 5px;
        font-size: 11px;
        color: var(--i2);
        cursor: pointer;
        transition: background 0.1s;
      }
      .si:hover {
        background: var(--pa);
      }
      .si.on {
        background: #eef1f7;
        color: var(--db);
        font-weight: 500;
      }
      .si .d {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--gl);
        flex-shrink: 0;
      }
      .si.on .d {
        background: var(--db);
      }
      .sb-ft {
        margin-top: auto;
        padding: 8px;
        border-top: 1px solid var(--bd);
      }
      .sb-u {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 5px;
        cursor: pointer;
      }
      .sb-u:hover {
        background: var(--pa);
      }
      .av {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--db);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        color: #fff;
        font-weight: 600;
      }

      /* Main layout: sidebar + workspace */
      .ws {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      /* 에피소드 목록 */
      .ep-list-col {
        width: 300px;
        min-width: 300px;
        height: 100%;
        background: var(--wh);
        border-right: 1px solid var(--bd);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .ep-list-hd {
        flex-shrink: 0;
        padding: 14px 16px 0;
        border-bottom: 1px solid var(--bd);
      }
      .ep-list-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .ep-list-ttl {
        font-family: "Noto Serif KR", serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .abtn {
        padding: 4px 11px;
        border-radius: 6px;
        border: 1px solid var(--bd2);
        background: var(--wh);
        font-size: 11px;
        color: var(--i2);
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .abtn:hover {
        border-color: var(--db);
        color: var(--db);
      }
      .abtn.pri {
        background: var(--db);
        color: #fff;
        border-color: var(--db);
      }
      .abtn.pri:hover {
        background: #1e3d73;
      }
      /* ep tabs */
      .etabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--bd);
        margin: 0 -16px;
        padding: 0 16px;
      }
      .etab {
        padding: 5px 11px;
        font-size: 11px;
        color: var(--gh);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }
      .etab:hover {
        color: var(--i2);
      }
      .etab.on {
        color: var(--db);
        border-bottom-color: var(--db);
        font-weight: 500;
      }
      .ep-list-bd {
        flex: 1;
        overflow-y: auto;
      }
      /* ep rows */
      .erow {
        display: flex;
        align-items: stretch;
        gap: 11px;
        padding: 10px 14px;
        cursor: pointer;
        position: relative;
        border-bottom: 1px solid var(--bd);
      }
      .erow::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: transparent;
      }
      .erow:hover {
        background: #f8f9fc;
      }
      .erow:hover::before {
        background: var(--gl);
      }
      .erow.on {
        background: #eef1f7;
      }
      .erow.on::before {
        background: var(--db);
      }
      .eth {
        width: 40px;
        min-width: 40px;
        aspect-ratio: 238/324;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .eth-n {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.85);
      }
      .ebody {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 3px;
      }
      .ebody-num {
        font-size: 9px;
        font-family: "DM Mono", monospace;
        color: var(--gh);
      }
      .ebody-ttl {
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ebody-memo {
        font-size: 10px;
        color: var(--i2);
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
      }
      .ebody-memo.empty {
        color: var(--gh);
        font-style: italic;
      }
      .ebody-ft {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 1px;
      }
      .ebody-pg {
        font-size: 9px;
        font-family: "DM Mono", monospace;
        color: var(--gh);
      }
      .etag {
        font-size: 8px;
        padding: 1px 5px;
        border-radius: 999px;
      }
      .t-wip {
        background: var(--am-bg);
        color: #8a6200;
        border: 1px solid rgba(251, 198, 98, 0.4);
      }
      .t-done {
        background: #e8f5ee;
        color: #2a7a50;
        border: 1px solid #b6dfc8;
      }
      .t-todo {
        background: var(--pa);
        color: var(--gh);
        border: 1px solid var(--bd2);
      }
      .er-acts {
        display: flex;
        flex-direction: column;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.1s;
      }
      .erow:hover .er-acts {
        opacity: 1;
      }
      .drag-h {
        display: flex;
        flex-direction: column;
        gap: 2px;
        cursor: grab;
        padding: 4px 2px;
      }
      .drag-h span {
        display: block;
        width: 10px;
        height: 1.5px;
        background: var(--gl);
        border-radius: 1px;
      }
      .ep-add-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 11px;
        cursor: pointer;
        color: var(--gh);
        font-size: 11px;
        border-bottom: 1px solid var(--bd);
        border-top: 2px dashed var(--bd2);
      }
      .ep-add-row:hover {
        background: #f5f8ff;
        color: var(--db);
      }

      /* 오른쪽 에피소드 디테일 */
      .ep-detail-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }
      .ep-det-hd {
        flex-shrink: 0;
        padding: 16px 22px;
        border-bottom: 1px solid var(--bd);
        background: var(--wh);
      }
      .ep-det-ttl {
        font-family: "Noto Serif KR", serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 3px;
      }
      .ep-det-meta {
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--gh);
      }
      .ep-det-tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--bd);
        margin: 12px -22px 0;
        padding: 0 22px;
      }
      .ep-det-tab {
        padding: 6px 12px;
        font-size: 12px;
        color: var(--gh);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }
      .ep-det-tab:hover {
        color: var(--i2);
      }
      .ep-det-tab.on {
        color: var(--db);
        border-bottom-color: var(--db);
        font-weight: 500;
      }
      .ep-det-bd {
        flex: 1;
        overflow-y: auto;
        padding: 20px 22px;
      }

      /* 메모 탭 */
      .memo-sec {
        margin-bottom: 20px;
      }
      .memo-sec-ttl {
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--gh);
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--bd);
      }
      .memo-textarea {
        width: 100%;
        background: var(--pa);
        border: 1px solid var(--bd2);
        border-radius: 7px;
        padding: 10px 13px;
        font-size: 12px;
        font-family: "Noto Sans KR", sans-serif;
        color: var(--ink);
        resize: none;
        outline: none;
        line-height: 1.7;
      }
      .memo-textarea:focus {
        border-color: var(--oc);
        box-shadow: 0 0 0 3px rgba(42, 77, 136, 0.08);
      }
      /* 페이지 메모 목록 */
      .pmemo-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .pmemo-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
      }
      .pmemo-row:hover {
        background: var(--pa);
      }
      .pmemo-n {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--gh);
        min-width: 26px;
        flex-shrink: 0;
        padding-top: 1px;
      }
      .pmemo-t {
        font-size: 11px;
        color: var(--i2);
        line-height: 1.4;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pmemo-t.empty {
        color: var(--gh);
        font-style: italic;
      }

      /* 설정 탭 */
      .cfg-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .cfg-card {
        background: var(--pa);
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 11px 14px;
        cursor: pointer;
      }
      .cfg-card:hover {
        border-color: var(--oc);
      }
      .cfg-card.ov {
        background: var(--am-bg);
        border-color: rgba(251, 198, 98, 0.4);
      }
      .cfg-card-lbl {
        font-size: 10px;
        color: var(--gh);
        margin-bottom: 4px;
      }
      .cfg-card-val {
        font-size: 14px;
        font-family: "DM Mono", monospace;
        font-weight: 500;
        color: var(--ink);
      }
      .cfg-card.ov .cfg-card-val {
        color: #8a6200;
      }
      .cfg-card-note {
        font-size: 9px;
        color: var(--am);
        margin-top: 3px;
        font-family: "DM Mono", monospace;
      }

      /* 페이지 썸네일 그리드 탭 */
      .pg-mini-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      .pg-mini {
        aspect-ratio: 238/324;
        background: var(--wh);
        border: 1px solid var(--bd);
        border-radius: 3px;
        position: relative;
        cursor: pointer;
      }
      .pg-mini:hover {
        border-color: var(--oc);
      }
      .pg-mini-n {
        position: absolute;
        bottom: 3px;
        right: 4px;
        font-size: 8px;
        font-family: "DM Mono", monospace;
        color: var(--gh);
      }
      .pg-mini-memo {
        position: absolute;
        top: 4px;
        left: 4px;
        right: 4px;
        font-size: 7px;
        color: var(--i2);
        overflow: hidden;
        height: 28px;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="hd">
      <button class="hd-menu"><span></span><span></span><span></span></button>
      <div class="bc">
        <a>책장</a><span class="sep">›</span> <a>고양이와 강아지</a
        ><span class="sep">›</span>
        <span class="cur">에피소드 관리</span>
      </div>
      <div class="hd-r">
        <button class="hbtn">⚙</button>
        <button class="hbtn">⋯</button>
      </div>
    </div>

    <div class="main">
      <div class="sb">
        <div class="sb-logo">
          <div class="sb-mk">
            <svg viewBox="0 0 14 14">
              <rect x="1" y="1" width="4" height="12" rx="1" />
              <rect x="7" y="1" width="4" height="7" rx="1" opacity=".6" />
              <rect x="7" y="10" width="4" height="3" rx="1" opacity=".4" />
            </svg>
          </div>
          <span class="sb-nm">plotnote</span>
        </div>
        <div class="sb-sec">
          <div class="sb-lbl">고양이와 강아지</div>
          <div class="si">
            <div class="d"></div>
            프로젝트 개요
          </div>
          <div class="si on">
            <div class="d"></div>
            에피소드 관리
          </div>
        </div>
        <div class="sb-sec">
          <div class="sb-lbl">내 책장</div>
          <div class="si">
            <div class="d"></div>
            베베의 작업실
          </div>
        </div>
        <div class="sb-ft">
          <div class="sb-u">
            <div class="av">베</div>
            <span style="font-size: 11px; color: var(--i2)">베베</span>
          </div>
        </div>
      </div>

      <div class="ws">
        <!-- 에피소드 목록 (좌) -->
        <div class="ep-list-col">
          <div class="ep-list-hd">
            <div class="ep-list-top">
              <div class="ep-list-ttl">에피소드</div>
              <button class="abtn pri" onclick="addEp()">+ 추가</button>
            </div>
            <div class="etabs">
              <div class="etab on" onclick="swEtab('all', this)">
                전체
                <span
                  style="
                    font-family: &quot;DM Mono&quot;, monospace;
                    font-size: 9px;
                  "
                  >7</span
                >
              </div>
              <div class="etab" onclick="swEtab('wip', this)">진행중</div>
              <div class="etab" onclick="swEtab('done', this)">완료</div>
            </div>
          </div>
          <div class="ep-list-bd" id="ep-list"></div>
        </div>

        <!-- 에피소드 디테일 (우) -->
        <div class="ep-detail-col">
          <div
            id="det-placeholder"
            style="
              flex: 1;
              display: flex;
              align-items: center;
              justify-content: center;
              flex-direction: column;
              gap: 12px;
              color: var(--gh);
            "
          >
            <div style="font-size: 32px; opacity: 0.2">📋</div>
            <div style="font-size: 13px">에피소드를 선택하세요</div>
          </div>
          <div
            id="det-panel"
            style="
              display: none;
              flex: 1;
              flex-direction: column;
              overflow: hidden;
            "
          >
            <div class="ep-det-hd">
              <div
                style="
                  display: flex;
                  align-items: flex-start;
                  justify-content: space-between;
                "
              >
                <div>
                  <div class="ep-det-ttl" id="det-ttl">첫 만남</div>
                  <div class="ep-det-meta" id="det-meta">1화 · 24p · RTL</div>
                </div>
                <div style="display: flex; gap: 6px; margin-top: 3px">
                  <button class="abtn">페이지 관리 →</button>
                </div>
              </div>
              <div class="ep-det-tabs">
                <div class="ep-det-tab on" onclick="swDet('memo', this)">
                  메모
                </div>
                <div class="ep-det-tab" onclick="swDet('pages', this)">
                  페이지 목록
                </div>
                <div class="ep-det-tab" onclick="swDet('cfg', this)">
                  개별 설정
                </div>
              </div>
            </div>
            <div class="ep-det-bd">
              <!-- 메모 탭 -->
              <div id="det-memo">
                <div class="memo-sec">
                  <div class="memo-sec-ttl">에피소드 메모</div>
                  <textarea
                    class="memo-textarea"
                    rows="4"
                    placeholder="에피소드 전체 메모..."
                  >
고양이와 강아지가 공원에서 처음 마주치는 장면. 처음엔 어색하지만 점점 가까워짐.</textarea
                  >
                </div>
                <div class="memo-sec">
                  <div class="memo-sec-ttl">
                    페이지별 메모
                    <span
                      style="
                        font-family: &quot;DM Mono&quot;, monospace;
                        font-size: 10px;
                        color: var(--gh);
                      "
                      >(클릭하면 해당 페이지로)</span
                    >
                  </div>
                  <div class="pmemo-list" id="pmemo-list"></div>
                </div>
              </div>
              <!-- 페이지 탭 -->
              <div id="det-pages" style="display: none">
                <div class="pg-mini-grid" id="pg-mini-grid"></div>
              </div>
              <!-- 설정 탭 -->
              <div id="det-cfg" style="display: none">
                <div
                  style="
                    font-size: 11px;
                    color: var(--gh);
                    margin-bottom: 14px;
                    line-height: 1.6;
                  "
                >
                  프로젝트 기본 설정과 다른 항목만 표시됩니다. 카드를 클릭하면
                  변경할 수 있습니다.
                </div>
                <div class="cfg-grid">
                  <div class="cfg-card">
                    <div class="cfg-card-lbl">기본 페이지수</div>
                    <div class="cfg-card-val">24p</div>
                  </div>
                  <div class="cfg-card ov">
                    <div class="cfg-card-lbl">시작 페이지</div>
                    <div class="cfg-card-val">짝수</div>
                    <div class="cfg-card-note">⚠ 프로젝트와 다름 (홀수)</div>
                  </div>
                  <div class="cfg-card">
                    <div class="cfg-card-lbl">읽기 방향</div>
                    <div class="cfg-card-val">RTL</div>
                  </div>
                  <div class="cfg-card">
                    <div class="cfg-card-lbl">기본 뷰</div>
                    <div class="cfg-card-val">양면</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const eps = [
        {
          n: "1화",
          t: "첫 만남",
          memo: "고양이와 강아지가 공원에서 처음 만남.",
          pg: 24,
          tag: "done",
        },
        {
          n: "2화",
          t: "공원의 하루",
          memo: "함께 공원을 탐험.",
          pg: 24,
          tag: "done",
        },
        {
          n: "3화",
          t: "이웃 친구들",
          memo: "동네 친구들 소개.",
          pg: 24,
          tag: "wip",
        },
        { n: "4화", t: "비 오는 날", memo: "", pg: 24, tag: "wip" },
        { n: "5화", t: "새 에피소드", memo: "", pg: 24, tag: "todo" },
        { n: "6화", t: "새 에피소드", memo: "", pg: 24, tag: "todo" },
        { n: "7화", t: "새 에피소드", memo: "", pg: 24, tag: "todo" },
      ];
      const tagCls = { done: "t-done", wip: "t-wip", todo: "t-todo" };
      const tagMap = { done: "완료", wip: "진행중", todo: "예정" };
      const colors = [
        "linear-gradient(150deg,#B1BBC8,#7C94B8)",
        "linear-gradient(150deg,#8998b1,#6b7a98)",
        "linear-gradient(150deg,#7C94B8,#5a7aaa)",
        "linear-gradient(150deg,#b89fe8,#8998b1)",
      ];
      let selEp = -1;

      function renderEpList() {
        const list = document.getElementById("ep-list");
        list.innerHTML = "";
        eps.forEach((e, i) => {
          const row = document.createElement("div");
          row.className = "erow" + (selEp === i ? " on" : "");
          row.innerHTML = `
      <div class="eth" style="background:${colors[i % colors.length]}"><span class="eth-n">${i + 1}</span></div>
      <div class="ebody">
        <div class="ebody-num">${e.n}</div>
        <div class="ebody-ttl">${e.t}</div>
        <div class="ebody-memo${e.memo ? "" : " empty"}">${e.memo || "메모 없음"}</div>
        <div class="ebody-ft"><span class="ebody-pg">${e.pg}p</span><span class="etag ${tagCls[e.tag]}">${tagMap[e.tag]}</span></div>
      </div>
      <div class="er-acts"><div class="drag-h"><span></span><span></span><span></span></div></div>`;
          row.addEventListener("click", () => selEpItem(i));
          list.appendChild(row);
        });
        const addRow = document.createElement("div");
        addRow.className = "ep-add-row";
        addRow.innerHTML =
          '<span style="font-size:14px">+</span> 에피소드 추가';
        addRow.onclick = addEp;
        list.appendChild(addRow);
      }

      function selEpItem(i) {
        selEp = i;
        renderEpList();
        const e = eps[i];
        document.getElementById("det-placeholder").style.display = "none";
        const panel = document.getElementById("det-panel");
        panel.style.display = "flex";
        document.getElementById("det-ttl").textContent = e.t;
        document.getElementById("det-meta").textContent =
          `${e.n} · ${e.pg}p · RTL`;
        // page memos
        const pmemoList = document.getElementById("pmemo-list");
        pmemoList.innerHTML = "";
        const pageMemos = [
          "고양이가 공원에 들어오는 장면",
          "강아지와 처음 눈이 마주침",
          "",
          "두 동물이 어색하게 주변을 돌아다님",
          "",
          "서로 조심스럽게 다가가는 장면",
          "",
          "처음으로 코를 맞대는 장면",
          "",
          "놀이를 시작하는 장면",
          "",
          "",
        ];
        for (let p = 0; p < e.pg; p++) {
          const row = document.createElement("div");
          row.className = "pmemo-row";
          const t = pageMemos[p] || "";
          row.innerHTML = `<span class="pmemo-n">${String(p + 1)}p</span><span class="pmemo-t${t ? "" : " empty"}">${t || "메모 없음"}</span>`;
          pmemoList.appendChild(row);
        }
        // page mini grid
        const grid = document.getElementById("pg-mini-grid");
        grid.innerHTML = "";
        for (let p = 0; p < e.pg; p++) {
          const pg = document.createElement("div");
          pg.className = "pg-mini";
          const memo = pageMemos[p] || "";
          pg.innerHTML = `${memo ? `<div class="pg-mini-memo">${memo}</div>` : ""}<div class="pg-mini-n">${p + 1}</div>`;
          grid.appendChild(pg);
        }
      }

      function addEp() {
        eps.push({
          n: `${eps.length + 1}화`,
          t: "새 에피소드",
          memo: "",
          pg: 24,
          tag: "todo",
        });
        renderEpList();
        selEpItem(eps.length - 1);
      }

      function swEtab(id, el) {
        document
          .querySelectorAll(".etab")
          .forEach((t) => t.classList.remove("on"));
        el.classList.add("on");
      }

      function swDet(id, el) {
        ["memo", "pages", "cfg"].forEach(
          (t) =>
            (document.getElementById("det-" + t).style.display =
              t === id ? "" : "none"),
        );
        document
          .querySelectorAll(".ep-det-tab")
          .forEach((t) => t.classList.remove("on"));
        el.classList.add("on");
      }

      renderEpList();
    </script>
  </body>
</html>
