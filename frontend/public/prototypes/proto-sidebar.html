<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PlotNote — Sidebar Component</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--db:#2A4D88;--oc:#7C94B8;--gl:#B1BBC8;--co:#D9D9D8;--am:#fbc662;--am-bg:#fff8e6;--wh:#fefefe;--pa:#f7f6f3;--ink:#1a1a1a;--i2:#4a4a4a;--gh:#9a9a9a;--bd:#e8e6e0;--bd2:#d5d2cb;--rail:44px;--sw:220px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--pa);color:var(--ink);height:100vh;overflow:hidden;display:flex;font-size:13px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}

/* ═══════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════ */
.sb{
  width:var(--sw);min-width:var(--sw);height:100%;
  background:var(--wh);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  transition:width .22s cubic-bezier(.4,0,.2,1),min-width .22s cubic-bezier(.4,0,.2,1);
  overflow:visible;position:relative;z-index:50;flex-shrink:0;
}

/* ── RAIL MODE ── */
.sb.rail{width:var(--rail);min-width:var(--rail);}
.sb.rail .sb-exp{display:none;}          /* 펼침 전용 요소 숨김 */
.sb.rail .sb-logo-txt{display:none;}
.sb.rail .sb-logo{justify-content:center;padding:8px;}
.sb.rail .sb-tree{display:none;}
.sb.rail .sb-search{display:none;}
.sb.rail .sb-ft-name{display:none;}
.sb.rail .sb-ft{justify-content:center;padding:8px;}
.sb.rail .sb-rail-nav{display:flex;}     /* rail 전용 아이콘 표시 */

/* ── LOGO ── */
.sb-logo{
  padding:10px 12px;display:flex;align-items:center;gap:7px;
  flex-shrink:0;border-bottom:1px solid var(--bd);
}
/* 로고 마크 */
.sb-mk{
  width:24px;height:24px;background:var(--db);border-radius:5px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
}
.sb-mk svg{width:12px;height:12px;fill:#fff;}
.sb-logo-txt{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);font-weight:500;}
.sb-collapse{
  margin-left:auto;width:20px;height:20px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  color:var(--gh);cursor:pointer;flex-shrink:0;opacity:.6;
}
.sb-collapse:hover{background:var(--pa);opacity:1;}
.sb-collapse img{width:16px;height:16px;}

/* ── SEARCH (사이드바 내부) ── */
.sb-search{padding:8px 10px 4px;flex-shrink:0;}
.sb-srch{
  display:flex;align-items:center;gap:5px;
  padding:5px 9px;background:var(--pa);border:1px solid var(--bd);
  border-radius:6px;cursor:pointer;width:100%;
}
.sb-srch:hover{border-color:var(--oc);}
.sb-srch img{flex-shrink:0;width:14px;height:14px;opacity:.6;}
.sb-srch span{font-size:10px;color:var(--gh);}

/* ── TREE ── */
.sb-tree{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0;}
.sb-tree::-webkit-scrollbar{width:4px;}
.sb-tree::-webkit-scrollbar-thumb{background:var(--co);border-radius:2px;}

/* 섹션 (즐겨찾기 / 나의 책장 / 공유 책장) */
.sb-grp{padding:2px 6px;}
.sb-grp-hd{
  display:flex;align-items:center;gap:6px;
  padding:5px 6px;border-radius:5px;cursor:pointer;
  font-size:11px;color:var(--i2);user-select:none;
}
.sb-grp-hd:hover{background:var(--pa);}
.sb-grp-hd .ic{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-grp-hd .ic img{width:16px;height:16px;opacity:.55;}
.sb-grp-hd .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-grp-hd .chv{
  width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-grp-hd .chv img{width:14px;height:14px;opacity:.4;transition:transform .15s;}
/* 그룹 열림 상태: 화살표 90도 회전 */
.sb-grp:not(.closed) .sb-grp-hd .chv img{transform:rotate(90deg);}
.sb-grp-bd{padding-left:0;}
.sb-grp.closed .sb-grp-bd{display:none;}

/* 트리 노드 (프로젝트/에피소드/페이지) */
.tn{display:flex;flex-direction:column;}
.tn-row{
  display:flex;align-items:center;gap:4px;
  padding:3px 6px;padding-left:var(--indent,6px);
  border-radius:4px;cursor:pointer;font-size:11px;color:var(--i2);
  position:relative;min-height:26px;
}
.tn-row:hover{background:var(--pa);}
.tn-row.on{background:#eef1f7;color:var(--db);font-weight:500;}
.tn-chv{
  width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.tn-chv img{width:14px;height:14px;opacity:.35;transition:transform .12s;}
/* 노드 열림: 화살표 90도 회전 */
.tn:not(.closed)>.tn-row .tn-chv img{transform:rotate(90deg);}
.tn-chv.leaf{visibility:hidden;}
.tn-ic{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tn-ic img{width:16px;height:16px;opacity:.45;}
.tn-row.on .tn-ic img{opacity:.85;}
.tn-lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tn-kids{display:flex;flex-direction:column;}
.tn.closed>.tn-kids{display:none;}

/* 노드 아이콘 열림/닫힘 상태 */
/* 기본: 닫힘 아이콘 표시, 열림 아이콘 숨김 */
.tn-ic .ic-o{display:none;}
.tn-ic .ic-c{display:block;}
/* 비leaf 노드가 열렸을 때: 열림 아이콘 표시 */
.tn:not(.closed):not(.leaf)>.tn-row .tn-ic .ic-o{display:block;}
.tn:not(.closed):not(.leaf)>.tn-row .tn-ic .ic-c{display:none;}
/* leaf 노드 active 상태: 편집 아이콘 표시 */
.tn.leaf>.tn-row.on .tn-ic .ic-o{display:block;}
.tn.leaf>.tn-row.on .tn-ic .ic-c{display:none;}

/* ── RAIL NAV (접힌 상태 context 아이콘) ── */
.sb-rail-nav{
  display:none;flex-direction:column;gap:2px;
  padding:8px 4px;flex:1;
}
.rn-item{
  width:36px;height:36px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
}
.rn-item img{width:20px;height:20px;opacity:.45;}
.rn-item:hover{background:var(--pa);}
.rn-item:hover img{opacity:.75;}
.rn-item.on{background:#eef1f7;}
.rn-item.on img{opacity:.9;}
/* Rail hover popup */
.rn-pop{
  display:none;position:absolute;left:100%;top:0;margin-left:6px;
  background:var(--wh);border:1px solid var(--bd);border-radius:8px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);padding:6px 0;
  min-width:170px;max-width:230px;max-height:260px;overflow-y:auto;z-index:100;
  white-space:nowrap;
}
.rn-pop::-webkit-scrollbar{width:4px;}
.rn-pop::-webkit-scrollbar-thumb{background:var(--co);border-radius:2px;}
.rn-item:hover .rn-pop{display:block;}
.rn-pop-hd{padding:5px 12px 4px;font-size:9px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--gh);border-bottom:1px solid var(--bd);margin-bottom:2px;}
.rn-pop-i{padding:5px 12px;font-size:11px;color:var(--i2);cursor:pointer;overflow:hidden;text-overflow:ellipsis;}
.rn-pop-i:hover{background:var(--pa);color:var(--db);}
.rn-pop-i.on{color:var(--db);font-weight:500;}

/* ── FOOTER ── */
.sb-ft{
  padding:8px 10px;border-top:1px solid var(--bd);
  display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;
}
.sb-ft:hover{background:var(--pa);}
.sb-av{
  width:24px;height:24px;border-radius:50%;
  background:var(--db);display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;font-weight:600;flex-shrink:0;
}
.sb-ft-name{font-size:11px;color:var(--i2);}

/* ═══ DUMMY MAIN (프리뷰 전용) ═══ */
.main-dummy{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.main-hd{padding:12px 20px;background:var(--wh);border-bottom:1px solid var(--bd);font-size:12px;color:var(--gh);font-family:'DM Mono',monospace;}
.main-bd{flex:1;display:flex;align-items:center;justify-content:center;color:var(--gh);font-size:14px;}
</style>
</head>
<body>

<!-- ═══════════════════════════════════

<aside class="sb" id="sb">

  <!-- LOGO + COLLAPSE -->
  <div class="sb-logo">

      <svg viewBox="0 0 14 14">

            <span class="tn-ic">
              <img class="ic-c" src="../../src/assets/images/book_close_20dp_000000_FILL0_wght400_GRAD0_opsz20.svg" alt="">
              <img class="ic-o" src="../../src/assets/images/book_open_20dp_000000_FILL0_wght400_GRAD0_opsz20.svg" alt="">

<!-- DUMMY MAIN (프리뷰 전용) -->
<div class="main-dummy">
  <div class="main-hd">Episode — 에피소드2 <span style="float:right;cursor:pointer" onclick="tglSb()">☰ 사이드바 토글</span></div>
  <div class="main-bd">메인 컨텐츠 영역</div>
</div>

<script>
/* sidebar collapse/expand */
function tglSb(){
  document.getElementById('sb').classList.toggle('rail');
}

/* group toggle (즐겨찾기/나의책장/공유책장) */
function tglGrp(id){
  document.getElementById(id).classList.toggle('closed');
}

/* tree node toggle (leaf는 호출 안 함 — 각 페이지 노드의 onclick에서 제외) */
function tglTn(id){
  document.getElementById(id).classList.toggle('closed');
}

/* search modal stub */
function openS(){
  alert('검색 모달 (stub)');
}
</script>
</body>
</html>
